<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>윤들러 · 관리자</title>
<style>
:root{
  --bg:#0d0f14; --card:#1b2130; --card2:#222a3b; --line:#2a3242;
  --txt:#eef2f8; --sub:#8e9bb3; --mut:#5f6b82; --accent:#ff5a36; --gold:#ffc857; --good:#2ecc71;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
.wrap{max-width:920px;margin:0 auto;padding:20px 18px 80px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.top h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.top h1 span{color:var(--accent)}
.top .home{font-size:14px;color:var(--sub);font-weight:600;padding:8px 14px;border:1px solid var(--line);border-radius:10px}
.sub{color:var(--sub);font-size:14px;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-1px}
.stat .v.accent{color:var(--accent)}
.stat .k{font-size:13px;color:var(--sub);margin-top:4px}
.bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.bar input{flex:1;min-width:180px;padding:12px 14px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt);font-size:15px;outline:none}
.bar input:focus{border-color:var(--accent)}
.bar .cnt{font-size:13px;color:var(--mut)}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
th,td{text-align:left;padding:14px 16px;font-size:14px;border-bottom:1px solid var(--line)}
th{color:var(--mut);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--card2)}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:.12s}
tbody tr:hover{background:var(--card2)}
.uname{font-weight:700}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;margin-left:6px;background:rgba(255,200,87,.15);color:var(--gold)}
.muted{color:var(--mut);font-size:13px}
.empty{text-align:center;color:var(--mut);padding:50px;font-size:14px}
.gate{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:30px}
.gate h2{font-size:22px;font-weight:800}
.gate p{color:var(--sub);font-size:14px;line-height:1.6;max-width:340px}
.gate a{color:var(--accent);font-weight:700;text-decoration:none}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal.show{display:flex}
.sheet{background:var(--bg);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:920px;max-height:88vh;overflow:auto;padding:22px 20px 40px}
@media(min-width:600px){.modal{align-items:center}.sheet{border-radius:22px}}
.sheet .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sheet h3{font-size:20px;font-weight:800}
.sheet .x{font-size:26px;color:var(--mut);line-height:1;padding:4px 8px}
.mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:16px 0 20px}
.mini .m{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px}
.mini .m .v{font-size:20px;font-weight:800}
.mini .m .k{font-size:12px;color:var(--sub);margin-top:2px}
.log{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.log .d{font-size:12px;color:var(--mut);flex:0 0 70px}
.log .l{flex:1;font-weight:600;font-size:14px}
.log .r{font-size:13px;color:var(--sub)}
.log .r b{color:#ff7a4d}
.loading{text-align:center;color:var(--mut);padding:40px}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="loading" id="loading">불러오는 중…</div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
const FAKE_DOMAIN="@yundler.local";
const cfg=window.YUNDLER_CONFIG||{};
const configured=cfg.SUPABASE_URL&&cfg.SUPABASE_URL.startsWith("http")&&cfg.SUPABASE_ANON_KEY&&cfg.SUPABASE_ANON_KEY.length>20;
const sb=configured?window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY):null;
const LIFT_ICON={"오버헤드 프레스":"🏋️","데드리프트":"🦵","벤치프레스":"💪","스쿼트":"🍑"};

let allUsers=[], allWorkouts=[];

function gate(html){ document.getElementById("wrap").innerHTML=`<div class="gate">${html}</div>`; }

async function boot(){
  if(!configured){ gate(`<h2>서버 연결 전</h2><p>config.js에 Supabase 정보를 먼저 넣어주세요.</p><a href="index.html">‹ 앱으로</a>`); return; }
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ gate(`<h2>로그인이 필요해요</h2><p>관리자 계정으로 먼저 로그인하세요.</p><a href="index.html">‹ 로그인하러 가기</a>`); return; }
  const {data:me}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
  if(!me||!me.is_admin){ gate(`<h2>접근 권한 없음 🔒</h2><p>이 페이지는 관리자만 볼 수 있어요.<br>관리자 계정으로 로그인했는지 확인하세요.</p><a href="index.html">‹ 앱으로 돌아가기</a>`); return; }
  await loadAll();
}

async function loadAll(){
  const [{data:users},{data:workouts}]=await Promise.all([
    sb.from("profiles").select("*").order("created_at",{ascending:true}),
    sb.from("workouts").select("*").order("created_at",{ascending:false})
  ]);
  allUsers=users||[]; allWorkouts=workouts||[];
  renderDash();
}

function statsFor(uid){
  const w=allWorkouts.filter(x=>x.user_id===uid);
  const last=w[0]?new Date(w[0].created_at):null;
  return {count:w.length, last};
}
function fmtDate(d){ if(!d)return "—"; return `${d.getMonth()+1}/${d.getDate()}`; }
function daysAgo(d){ if(!d)return ""; const n=Math.floor((Date.now()-d)/86400000); return n===0?"오늘":n+"일 전"; }

function renderDash(){
  const totalW=allWorkouts.length;
  const active7=allUsers.filter(u=>{const s=statsFor(u.id);return s.last&&(Date.now()-s.last)<7*86400000;}).length;
  const wrap=document.getElementById("wrap");
  wrap.innerHTML=`
    <div class="top">
      <h1>윤<span>들러</span> 관리자</h1>
      <a class="home" href="index.html">‹ 앱으로</a>
    </div>
    <div class="sub">회원 활동과 운동 데이터를 한눈에</div>
    <div class="stats">
      <div class="stat"><div class="v accent">${allUsers.length}</div><div class="k">전체 회원</div></div>
      <div class="stat"><div class="v">${active7}</div><div class="k">최근 7일 활동</div></div>
      <div class="stat"><div class="v">${totalW}</div><div class="k">누적 운동 횟수</div></div>
    </div>
    <div class="bar">
      <input id="search" placeholder="🔍 아이디 검색">
      <span class="cnt" id="cnt"></span>
    </div>
    <table>
      <thead><tr><th>아이디</th><th>사이클</th><th>운동 수</th><th>최근 운동</th><th>가입일</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>`;
  document.getElementById("search").addEventListener("input",e=>renderRows(e.target.value.trim().toLowerCase()));
  renderRows("");
}

function renderRows(q){
  const rows=document.getElementById("rows");
  const list=allUsers.filter(u=>!q||(u.username||"").includes(q));
  document.getElementById("cnt").textContent=`${list.length}명`;
  if(!list.length){ rows.innerHTML=`<tr><td colspan="5" class="empty">결과 없음</td></tr>`; return; }
  rows.innerHTML=list.map(u=>{
    const s=statsFor(u.id);
    const st=u.state||{};
    const cyc=st.cycle?`사이클 ${st.cycle}·${["1주","2주","3주","회복"][st.week||0]}`:"<span class='muted'>미시작</span>";
    return `<tr data-uid="${u.id}">
      <td class="uname">${u.username||"?"}${u.is_admin?'<span class="badge">관리자</span>':''}</td>
      <td>${cyc}</td>
      <td>${s.count}</td>
      <td>${fmtDate(s.last)} <span class="muted">${daysAgo(s.last)}</span></td>
      <td class="muted">${u.created_at?fmtDate(new Date(u.created_at)):"—"}</td>
    </tr>`;
  }).join("");
  rows.querySelectorAll("tr").forEach(tr=>tr.addEventListener("click",()=>openUser(tr.dataset.uid)));
}

function openUser(uid){
  const u=allUsers.find(x=>x.id===uid); if(!u)return;
  const w=allWorkouts.filter(x=>x.user_id===uid);
  const st=u.state||{};
  const tm=st.tm||{};
  const unit=st.unit||"kg";
  const bestE=w.filter(x=>x.reps).reduce((m,x)=>Math.max(m,Math.round(x.weight*x.reps*0.0333+x.weight)),0);
  const sheet=document.getElementById("sheet");
  sheet.innerHTML=`
    <div class="sh"><h3>👤 ${u.username||"?"}</h3><button class="x" id="closeX">×</button></div>
    <div class="muted">${u.is_admin?"관리자 · ":""}가입 ${u.created_at?fmtDate(new Date(u.created_at)):"—"}</div>
    <div class="mini">
      <div class="m"><div class="v">${w.length}</div><div class="k">총 운동</div></div>
      <div class="m"><div class="v">${st.cycle||"—"}</div><div class="k">현재 사이클</div></div>
      <div class="m"><div class="v">${bestE||"—"}<small style="font-size:12px"> ${unit}</small></div><div class="k">최고 예상1RM</div></div>
    </div>
    ${Object.keys(tm).length?`<div class="muted" style="margin-bottom:14px">TM · 오버헤드 ${tm.ohp||"-"} / 데드 ${tm.dead||"-"} / 벤치 ${tm.bench||"-"} / 스쿼트 ${tm.squat||"-"} ${unit}</div>`:""}
    <div style="font-size:13px;font-weight:700;color:var(--mut);margin:8px 2px 10px">운동 기록 (${w.length})</div>
    ${w.length?w.slice(0,100).map(h=>{
      const dt=new Date(h.created_at);
      return `<div class="log"><div class="d">${dt.getMonth()+1}/${dt.getDate()}</div>
        <div class="l">${h.ic||LIFT_ICON[h.lift]||""} ${h.lift} <span class="muted">${h.label||""}</span></div>
        <div class="r">${h.weight}${unit} · ${h.reps!=null?`<b>${h.reps}회</b>`:"회복"}</div></div>`;
    }).join(""):`<div class="empty">아직 운동 기록이 없어요</div>`}`;
  document.getElementById("modal").classList.add("show");
  document.getElementById("closeX").onclick=closeModal;
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

boot();
</script>
</body>
</html>
